x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "25m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 10s

x-test-service: &test-service
  restart: unless-stopped
  init: true
  tty: true
  logging: *default-logging
  platform: ${DOCKER_PLATFORM:-linux/x86_64}

services:
  dev-relay:
    <<: *test-service
    build:
      context: .
      dockerfile: services/dev-relay/dockerfile
    image: bifrost-infra-dev-relay:dev
    hostname: dev-relay
    working_dir: /workspace
    environment:
      DEV_RELAY_PORT: ${DEV_RELAY_PORT:-8194}
      DEV_RELAY_BIND_HOST: 0.0.0.0
      IGLOO_TRACE: ${IGLOO_TRACE:-}
      IGLOO_TRACE_LEVEL: ${IGLOO_TRACE_LEVEL:-}
      CARGO_TARGET_DIR: /cargo-target
    ports:
      - "${DEV_RELAY_PORT:-8194}:${DEV_RELAY_PORT:-8194}"
    volumes:
      - ./repos/igloo-shell:/workspace/repos/igloo-shell:rw
      - ./repos/bifrost-rs:/workspace/repos/bifrost-rs:rw
      - cargo-target:/cargo-target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    healthcheck:
      <<: *healthcheck-defaults
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/${DEV_RELAY_PORT:-8194} && exec 3>&-'"
        ]

  igloo-demo:
    <<: *test-service
    build:
      context: .
      dockerfile: services/igloo-demo/dockerfile
    image: bifrost-infra-igloo-demo:dev
    hostname: igloo-demo
    working_dir: /workspace
    depends_on:
      dev-relay:
        condition: service_healthy
    environment:
      DEV_RELAY_HOST: dev-relay
      DEV_RELAY_PORT: ${DEV_RELAY_PORT:-8194}
      DEV_RELAY_INTERNAL_URL: ws://dev-relay:${DEV_RELAY_PORT:-8194}
      DEV_RELAY_EXTERNAL_HOST: ${DEV_RELAY_EXTERNAL_HOST:-127.0.0.1}
      DEV_RELAY_EXTERNAL_URL: ws://${DEV_RELAY_EXTERNAL_HOST:-127.0.0.1}:${DEV_RELAY_PORT:-8194}
      IGLOO_SHELL_DEMO_MEMBER: ${IGLOO_SHELL_DEMO_MEMBER:-alice}
      IGLOO_SHELL_DEMO_INVITE_MEMBERS: ${IGLOO_SHELL_DEMO_INVITE_MEMBERS:-bob,carol}
      IGLOO_SHELL_DEMO_THRESHOLD: ${IGLOO_SHELL_DEMO_THRESHOLD:-2}
      IGLOO_SHELL_DEMO_COUNT: ${IGLOO_SHELL_DEMO_COUNT:-3}
      IGLOO_SHELL_DEMO_ARTIFACT_DIR: ${IGLOO_SHELL_DEMO_ARTIFACT_DIR:-/workspace/data/test-harness}
      IGLOO_SHELL_DEMO_DIR: ${IGLOO_SHELL_DEMO_DIR:-/workspace/data/test-harness/demo-2of3}
      IGLOO_SHELL_DEMO_CONTROL_SOCKET: ${IGLOO_SHELL_DEMO_CONTROL_SOCKET:-/workspace/data/test-harness/igloo-shell-${IGLOO_SHELL_DEMO_MEMBER:-alice}.sock}
      IGLOO_SHELL_DEMO_CONTROL_TOKEN: ${IGLOO_SHELL_DEMO_CONTROL_TOKEN:-dev-harness-token}
      IGLOO_SHELL_DEMO_CONTROL_TOKEN_FILE: ${IGLOO_SHELL_DEMO_CONTROL_TOKEN_FILE:-/workspace/data/test-harness/igloo-shell-${IGLOO_SHELL_DEMO_MEMBER:-alice}.token}
      IGLOO_TRACE: ${IGLOO_TRACE:-}
      IGLOO_TRACE_LEVEL: ${IGLOO_TRACE_LEVEL:-}
      CARGO_TARGET_DIR: /cargo-target
    volumes:
      - ./repos/igloo-shell:/workspace/repos/igloo-shell:rw
      - ./repos/bifrost-rs:/workspace/repos/bifrost-rs:rw
      - ./services:/workspace/services:ro
      - ${IGLOO_SHELL_DEMO_HOST_ARTIFACT_DIR:-./data/test-harness}:${IGLOO_SHELL_DEMO_ARTIFACT_DIR:-/workspace/data/test-harness}:rw
      - cargo-target:/cargo-target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    healthcheck:
      <<: *healthcheck-defaults
      test:
        [
          "CMD-SHELL",
          "test -s ${IGLOO_SHELL_DEMO_ARTIFACT_DIR:-/workspace/data/test-harness}/onboard-bob.txt && test -s ${IGLOO_SHELL_DEMO_ARTIFACT_DIR:-/workspace/data/test-harness}/onboard-carol.txt && test -S ${IGLOO_SHELL_DEMO_CONTROL_SOCKET:-/workspace/data/test-harness/igloo-shell-${IGLOO_SHELL_DEMO_MEMBER:-alice}.sock}"
        ]

volumes:
  cargo-target: {}
  cargo-registry: {}
  cargo-git: {}
