name: igloo-web-v2

on:
  pull_request:
    paths:
      - "repos/igloo-web/**"
      - "test/package.json"
      - "test/package-lock.json"
      - "test/tsconfig.json"
      - "test/shared/**"
      - "test/igloo-web/**"
      - "repos/bifrost-rs/Cargo.toml"
      - "repos/bifrost-rs/Cargo.lock"
      - "repos/bifrost-rs/crates/bifrost-bridge-core/**"
      - "repos/bifrost-rs/crates/bifrost-bridge-wasm/**"
  push:
    branches:
      - main
    paths:
      - "repos/igloo-web/**"
      - "test/package.json"
      - "test/package-lock.json"
      - "test/tsconfig.json"
      - "test/shared/**"
      - "test/igloo-web/**"
      - "repos/bifrost-rs/Cargo.toml"
      - "repos/bifrost-rs/Cargo.lock"
      - "repos/bifrost-rs/crates/bifrost-bridge-core/**"
      - "repos/bifrost-rs/crates/bifrost-bridge-wasm/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            repos/igloo-web/package-lock.json
            test/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install igloo-web dependencies
        working-directory: repos/igloo-web
        run: npm ci

      - name: Install infra test dependencies
        working-directory: test
        run: npm install

      - name: Install Playwright browser
        working-directory: test
        run: npx playwright install --with-deps chromium

      - name: Build bridge wasm artifacts
        working-directory: repos/igloo-web
        run: npm run build:bridge-wasm

      - name: Verify wasm artifacts are committed
        run: git diff --exit-code -- repos/igloo-web/public/wasm

      - name: Integration tests
        working-directory: repos/igloo-web
        run: npm run test:int

      - name: E2E smoke tests
        working-directory: test
        run: npm run test:e2e:igloo-web

      - name: Cargo checks
        working-directory: repos/bifrost-rs
        run: |
          cargo check -p bifrost-bridge-core
          cargo check -p bifrost-bridge-wasm

      - name: Build igloo-web
        working-directory: repos/igloo-web
        run: npm run build
