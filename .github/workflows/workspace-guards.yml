name: workspace-guards

on:
  pull_request:
    paths:
      - ".github/workflows/workspace-guards.yml"
      - "README.md"
      - "CONTRIBUTING.md"
      - "Makefile"
      - "docs/**"
      - "dev/**"
      - "test/**"
      - "scripts/**"
      - ".gitmodules"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/workspace-guards.yml"
      - "README.md"
      - "CONTRIBUTING.md"
      - "Makefile"
      - "docs/**"
      - "dev/**"
      - "test/**"
      - "scripts/**"
      - ".gitmodules"

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: test/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            ripgrep

      - name: Install wasm-pack
        run: cargo install --locked --version 0.14.0 wasm-pack

      - name: Install test dependencies
        working-directory: test
        run: npm install

      - name: Run workspace guards
        working-directory: test
        run: npm run test:guards

      - name: Run dry affected check
        run: FROSTR_AFFECTED_DRY_RUN=1 FROSTR_AFFECTED_FILES='' make test-affected
