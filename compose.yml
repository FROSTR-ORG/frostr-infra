# Bifrost Infra Compose Stack

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "25m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 20s
  timeout: 5s
  retries: 5
  start_period: 20s

x-dev-service: &dev-service
  restart: unless-stopped
  init: true
  tty: true
  logging: *default-logging
  platform: ${DOCKER_PLATFORM:-linux/x86_64}

services:
  igloo-server:
    <<: *dev-service
    build:
      context: .
      dockerfile: services/containers/igloo-server/dockerfile
    image: bifrost-infra-igloo-server:dev
    container_name: bifrost-infra-igloo-server
    hostname: igloo-server
    user: "0:0"
    working_dir: /app
    environment:
      NODE_ENV: development
      HOST_NAME: 0.0.0.0
      PORT: 8002
      IGLOO_SERVER_MODE: ${IGLOO_SERVER_MODE:-dev}
      HEADLESS: ${IGLOO_SERVER_HEADLESS:-false}
      AUTH_ENABLED: ${IGLOO_SERVER_AUTH_ENABLED:-false}
      RATE_LIMIT_ENABLED: ${IGLOO_SERVER_RATE_LIMIT_ENABLED:-false}
      ADMIN_SECRET: ${IGLOO_SERVER_ADMIN_SECRET:-change-me}
      API_KEY: ${IGLOO_SERVER_API_KEY:-dev-local-key}
    networks:
      - infranet
    ports:
      - "${IGLOO_SERVER_PORT:-8002}:8002"
    volumes:
      - ./repos/igloo-server:/app:rw
      - ./data/igloo-server:/app/data:rw
      - ./logs/igloo-server:/app/logs:rw
      - igloo-server-node-modules:/app/node_modules
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "bun", "-e", "await fetch('http://localhost:8002/api/status').then(r=>{if(!r.ok)process.exit(1)})"]

  igloo-web:
    <<: *dev-service
    build:
      context: .
      dockerfile: services/containers/igloo-web/dockerfile
    image: bifrost-infra-igloo-web:dev
    container_name: bifrost-infra-igloo-web
    hostname: igloo-web
    working_dir: /app
    environment:
      VITE_IGLOO_SERVER_URL: ${VITE_IGLOO_SERVER_URL:-http://localhost:8002}
      IGLOO_WEB_MODE: ${IGLOO_WEB_MODE:-dev}
      IGLOO_WEB_INTERNAL_PORT: 5173
    networks:
      - infranet
    ports:
      - "${IGLOO_WEB_PORT:-5173}:5173"
    volumes:
      - ./repos/igloo-web:/app:rw
      - ./logs/igloo-web:/app/logs:rw
      - igloo-web-node-modules:/app/node_modules

  igloo-cli:
    <<: *dev-service
    build:
      context: .
      dockerfile: services/containers/igloo-cli/dockerfile
    image: bifrost-infra-igloo-cli:dev
    container_name: bifrost-infra-igloo-cli
    hostname: igloo-cli
    working_dir: /app
    environment:
      IGLOO_SERVER_URL: http://igloo-server:8002
      IGLOO_CLI_MODE: ${IGLOO_CLI_MODE:-dev}
    networks:
      - infranet
    stdin_open: true
    volumes:
      - ./repos/igloo-cli:/app:rw
      - ./logs/igloo-cli:/app/logs:rw
      - igloo-cli-node-modules:/app/node_modules

networks:
  infranet:
    driver: bridge

volumes:
  igloo-server-node-modules: {}
  igloo-web-node-modules: {}
  igloo-cli-node-modules: {}
